<script>
    const IS_GITHUB_PAGES = window.location.hostname.includes('github.io');
    const BASE_PATH = IS_GITHUB_PAGES ? '/mycuscotrip/' : '/';

    async function loadComponent(componentName, targetId) {
      try {
        const componentPath = `${BASE_PATH}components/${componentName}.html`;
        const response = await fetch(componentPath);

        if (!response.ok) {
          throw new Error(`Error ${response.status}: ${response.statusText}`);
        }

        const html = await response.text();
        const target = document.getElementById(targetId);

        if (target) {
          target.innerHTML = html;
          fixImagePaths(target);
          return true;
        }

        return false;
      } catch (error) {
        console.error(`Error cargando ${componentName}:`, error);

        const target = document.getElementById(targetId);
        if (target) {
          target.innerHTML = getFallbackContent(componentName);
        }

        return false;
      }
    }

    function fixImagePaths(container) {
      const images = container.querySelectorAll('img[src*="assets/"]');

      images.forEach((img) => {
        const currentSrc = img.getAttribute('src');

        if (currentSrc && currentSrc.startsWith('assets/')) {
          img.setAttribute('src', `./${currentSrc}`);
        }
      });
    }

    function getFallbackContent(componentName) {
      const fallbacks = {
        header: `
          <header style="background:#053220;padding:15px 0;">
            <div class="container" style="display:flex;justify-content:space-between;align-items:center;">
              <div style="color:white;font-weight:bold;font-size:1.2rem;">MyCuscoTrip</div>
              <nav>
                <a href="./index.html" style="color:white;margin:0 10px;">Home</a>
                <a href="./mi-reserva.html" style="color:white;margin:0 10px;">Mi Reserva</a>
              </nav>
            </div>
          </header>
        `,
        footer: `
          <footer style="background:#062803;color:white;padding:40px 0;margin-top:0;">
            <div class="container">
              <div style="text-align:center;">
                <p>© 2023 MyCuscoTrip</p>
                <p>Especialistas en viajes a Cusco y Machu Picchu</p>
              </div>
            </div>
          </footer>
        `
      };

      return fallbacks[componentName] || `<div>Componente ${componentName} no disponible</div>`;
    }

    function initializeComponents() {
      if (typeof MyCuscoTripHeader === 'function') {
        try {
          new MyCuscoTripHeader();
        } catch (e) {
          console.error('Error en Header JS:', e);
        }
      }
    }

    function syncFooterAccordions() {
      const accordions = document.querySelectorAll('.footer-accordion');
      if (!accordions.length) return;

      const isDesktop = window.innerWidth >= 769;

      accordions.forEach((item) => {
        item.open = isDesktop;
      });
    }

    async function initializeApp() {
      await Promise.all([
        loadComponent('header', 'header-container'),
        loadComponent('footer', 'footer-container')
      ]);

      syncFooterAccordions();
      setTimeout(syncFooterAccordions, 200);
      setTimeout(initializeComponents, 300);
    }

    window.addEventListener('resize', syncFooterAccordions);

    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', initializeApp);
    } else {
      initializeApp();
    }
  </script>

<script>
    const form = document.getElementById("reservaForm");
    const errorMessage = document.getElementById("errorMessage");
    const buscarBtn = document.getElementById("buscarBtn");

    function limpiarExacto(valor) {
      return String(valor || "").trim().toUpperCase();
    }

    function normalizarParaSugerencia(valor) {
      return limpiarExacto(valor)
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "");
    }

    function obtenerApellidoReserva(reserva) {
      return String(reserva?.apellido || "").trim();
    }

    function codigoCoincideExacto(reserva, codigoIngresado) {
      return limpiarExacto(reserva?.codigo) === limpiarExacto(codigoIngresado);
    }

    function apellidoCoincideExacto(reserva, apellidoIngresado) {
      const apellidoReserva = obtenerApellidoReserva(reserva);
      if (!apellidoReserva || !String(apellidoIngresado || "").trim()) return false;
      return limpiarExacto(apellidoReserva) === limpiarExacto(apellidoIngresado);
    }

    function distanciaLevenshtein(a, b) {
      const textoA = normalizarParaSugerencia(a);
      const textoB = normalizarParaSugerencia(b);
      const matriz = Array.from({ length: textoA.length + 1 }, () => []);

      for (let i = 0; i <= textoA.length; i++) matriz[i][0] = i;
      for (let j = 0; j <= textoB.length; j++) matriz[0][j] = j;

      for (let i = 1; i <= textoA.length; i++) {
        for (let j = 1; j <= textoB.length; j++) {
          const costo = textoA[i - 1] === textoB[j - 1] ? 0 : 1;
          matriz[i][j] = Math.min(
            matriz[i - 1][j] + 1,
            matriz[i][j - 1] + 1,
            matriz[i - 1][j - 1] + costo
          );
        }
      }

      return matriz[textoA.length][textoB.length];
    }

    function pareceApellidoMalEscrito(reserva, apellidoIngresado) {
      const apellidoReserva = obtenerApellidoReserva(reserva);
      const apellido = String(apellidoIngresado || "").trim();
      if (!apellidoReserva || !apellido) return false;

      const esperado = normalizarParaSugerencia(apellidoReserva);
      const ingresado = normalizarParaSugerencia(apellido);
      if (!esperado || !ingresado) return false;

      // Solo sugerimos error de escritura cuando el dato es razonablemente cercano.
      // Ejemplos: BATISTA / BAUTISTA, MELENDEZ / MELENDES, MUCKLE / MUKLE.
      const distancia = distanciaLevenshtein(esperado, ingresado);
      const limite = esperado.length <= 6 ? 1 : 2;
      return distancia > 0 && distancia <= limite;
    }

    async function cargarReservas() {
      const response = await fetch("./data/reservas.json", { cache: "no-store" });
      if (!response.ok) {
        throw new Error(`No se pudo cargar data/reservas.json (${response.status})`);
      }
      const reservas = await response.json();
      if (!Array.isArray(reservas)) {
        throw new Error("El archivo data/reservas.json no contiene una lista válida de reservas.");
      }
      return reservas;
    }

    async function consultarReservaBackend(codigo, apellido) {
      if (!window.MyCuscoTripApiClient?.lookupReservation) return null;
      try {
        const result = await window.MyCuscoTripApiClient.lookupReservation({ code: codigo, lastName: apellido });
        if (result?.found && result.voucher) return result.voucher;
        return null;
      } catch (error) {
        console.warn("No se pudo consultar el backend de reservas. Se usará respaldo estático.", error);
        return null;
      }
    }

    form.addEventListener("submit", async function (e) {
      e.preventDefault();

      errorMessage.style.display = "none";
      errorMessage.textContent = "";
      buscarBtn.disabled = true;
      buscarBtn.textContent = "Buscando...";

      const codigo = document.getElementById("codigo").value;
      const apellido = document.getElementById("apellido").value;

      if (!String(codigo || "").trim() || !String(apellido || "").trim()) {
        errorMessage.textContent = "Ingresa el código de reserva y el apellido.";
        errorMessage.style.display = "block";
        buscarBtn.disabled = false;
        buscarBtn.textContent = "Buscar reserva";
        return;
      }

      try {
        const reservaBackend = await consultarReservaBackend(codigo, apellido);
        if (reservaBackend) {
          localStorage.setItem("reservaSeleccionada", JSON.stringify(reservaBackend));
          const codigoUrl = encodeURIComponent(reservaBackend.codigo || String(codigo).trim());
          window.location.assign(`./detalle-reserva.html?codigo=${codigoUrl}`);
          return;
        }

        const reservas = await cargarReservas();
        const reservaPorCodigo = reservas.find((reserva) => codigoCoincideExacto(reserva, codigo));

        if (!reservaPorCodigo) {
          errorMessage.textContent = "No existe una reserva con esos datos.";
          errorMessage.style.display = "block";
          return;
        }

        if (!apellidoCoincideExacto(reservaPorCodigo, apellido)) {
          errorMessage.textContent = pareceApellidoMalEscrito(reservaPorCodigo, apellido)
            ? "Parece que escribiste mal tu apellido. Revisa que coincida exactamente con el apellido registrado."
            : "No existe una reserva con esos datos.";
          errorMessage.style.display = "block";
          return;
        }

        localStorage.setItem("reservaSeleccionada", JSON.stringify(reservaPorCodigo));
        const codigoUrl = encodeURIComponent(reservaPorCodigo.codigo || String(codigo).trim());
        window.location.assign(`./detalle-reserva.html?codigo=${codigoUrl}`);
      } catch (error) {
        console.error("Error consultando reserva:", error);
        errorMessage.textContent = "No se pudo consultar la reserva. Verifica el código y apellido, o contacta a tu asesor.";
        errorMessage.style.display = "block";
      } finally {
        buscarBtn.disabled = false;
        buscarBtn.textContent = "Buscar reserva";
      }
    });
  </script>
