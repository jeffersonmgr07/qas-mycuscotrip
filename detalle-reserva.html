<!DOCTYPE html>

<html lang="es">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Detalle de Reserva | MyCuscoTrip</title>
<link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;500;600;700&amp;family=Montserrat:wght@500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet"/>
<link href="./assets/css/main.css" rel="stylesheet"/>
<link href="./assets/css/components.css" rel="stylesheet"/>
<link href="./assets/css/header.css" rel="stylesheet"/>
<link href="./assets/css/footer.css" rel="stylesheet"/>
<link href="./assets/css/responsive.css" rel="stylesheet"/>
<style>
    :root {
      --brand-primary: #0f172a;
      --brand-dark-green: #253b2f;
      --brand-gold-dark: #b08a2d;
      --text-main: #1f2937;
      --text-soft: #667085;
      --text-mid: #7b7b7b;
      --line: #e6e8ec;
      --bg-soft: #f7f8fa;
      --white: #ffffff;
      --success-soft: #ecfdf3;
      --success-text: #166534;
      --warning-soft: #fff7ed;
      --warning-text: #b45309;
      --shadow-lg: 0 24px 80px rgba(15, 23, 42, 0.10);
      --shadow-md: 0 10px 30px rgba(15, 23, 42, 0.05);
      --radius-xl: 28px;
      --radius-lg: 22px;
      --radius-md: 16px;
      --radius-sm: 12px;
      --section-title-bg: #ffd84d;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: 'Open Sans', sans-serif;
      color: var(--text-main);
      background: #f3f5f7;
    }

    a {
      text-decoration: none;
    }

    .voucher-page {
      min-height: 100vh;
      padding: 74px 0 50px;
      background:
        linear-gradient(rgba(255,255,255,.90), rgba(255,255,255,.90)),
        url("./assets/img/reserva/machu-picchu-fondo.jpg") center/cover no-repeat fixed;
    }

    .voucher-shell {
      max-width: 1320px;
      margin: 0 auto;
      padding: 0 20px;
    }

    .top-actions {
      display: flex;
      justify-content: flex-end;
      align-items: center;
      gap: 12px;
      margin-bottom: 8px;
      flex-wrap: wrap;
    }

    .top-actions-right {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    .action-btn {
      border: none;
      border-radius: 14px;
      padding: 13px 18px;
      font-weight: 700;
      cursor: pointer;
      font-size: .95rem;
      transition: .2s ease;
    }

    .action-btn.primary {
      background: var(--brand-primary);
      color: white;
      box-shadow: var(--shadow-md);
    }

    .action-btn.secondary {
      background: white;
      color: var(--brand-primary);
      border: 1px solid var(--line);
    }

    .action-btn:hover {
      transform: translateY(-1px);
    }

    .voucher-web {
      background: white;
      border-radius: var(--radius-xl);
      overflow: hidden;
      box-shadow: var(--shadow-lg);
      border: 1px solid rgba(15, 23, 42, 0.04);
    }

    .voucher-top {
      display: grid;
      grid-template-columns: 1.05fr 1fr;
      gap: 26px;
      padding: 18px 34px 16px;
      border-bottom: 1px solid var(--line);
      background: white;
    }

    .voucher-brand {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 10px;
    }

    .voucher-brand img {
      width: 319px;
      max-width: 100%;
      height: auto;
      display: block;
    }

    .voucher-brand .subcopy {
      width: 319px;
      max-width: 100%;
      color: var(--text-mid);
      line-height: 1.32;
      font-size: .95rem;
      text-align: center;
      margin: 0;
    }

    .voucher-brand .contact {
      width: 319px;
      max-width: 100%;
      display: grid;
      gap: 1px;
      color: var(--brand-dark-green);
      font-size: .9rem;
      line-height: 1.22;
      text-align: center;
    }

    .voucher-divider {
      display: none;
      width: 100%;
      max-width: 340px;
      height: 1px;
      background: var(--brand-gold-dark);
      opacity: .9;
      margin: 0 auto 4px;
    }

    .voucher-head {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }

    .voucher-head-main {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      width: 100%;
    }

    .voucher-head .date {
      color: var(--text-mid);
      font-weight: 700;
      font-size: 1.44rem;
      line-height: 1.1;
      margin-bottom: 8px;
      text-align: center;
      white-space: nowrap;
    }

    .voucher-head .title {
      font-family: 'Montserrat', sans-serif;
      font-size: clamp(2rem, 3vw, 3.1rem);
      line-height: 1;
      letter-spacing: .02em;
      color: var(--brand-dark-green);
      margin: 0 0 12px;
      text-align: center;
      white-space: nowrap;
    }

    .voucher-code-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
    }

    .voucher-code {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 7px;
      padding: 14px 18px;
      border-radius: 20px;
      background: linear-gradient(180deg, #ffffff 0%, #f8fafc 100%);
      border: 1px solid var(--line);
      min-width: 300px;
      text-align: center;
    }

    .voucher-code span {
      font-size: .78rem;
      text-transform: uppercase;
      letter-spacing: .08em;
      color: var(--text-soft);
      font-weight: 700;
    }

    .voucher-code strong {
      font-family: 'Montserrat', sans-serif;
      font-size: 1.45rem;
      letter-spacing: .1em;
      color: var(--brand-primary);
      text-align: center;
    }

    .voucher-qr {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .voucher-qr img {
      width: 130px;
      height: 130px;
      object-fit: contain;
      display: block;
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 8px;
      background: white;
    }

    .summary-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
      padding: 14px 34px 18px;
      background: #fcfcfd;
      border-bottom: 1px solid var(--line);
    }

    .summary-card {
      padding: 10px 14px;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: white;
      min-height: 70px;
    }

    .summary-card .label {
      display: block;
      margin-bottom: 4px;
      font-size: .73rem;
      letter-spacing: .04em;
      text-transform: uppercase;
      color: var(--text-soft);
      font-weight: 700;
      text-align: center;
    }

    .summary-card .value {
      font-size: .93rem;
      line-height: 1.38;
      font-weight: 700;
      color: var(--brand-primary);
      word-break: break-word;
      text-align: center;
    }

    .voucher-content {
      display: grid;
      grid-template-columns: 1fr;
      gap: 18px;
      padding: 20px 34px 28px;
      background: #fafbfc;
    }

    .row-full {
      display: grid;
      gap: 18px;
    }

    .row-secondary {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 18px;
      align-items: start;
    }

    .row-bottom {
      display: grid;
      grid-template-columns: 1fr .92fr;
      gap: 18px;
      align-items: start;
    }

    .main-column,
    .side-column {
      display: grid;
      gap: 18px;
      align-content: start;
    }

    .card {
      background: white;
      border: 1px solid var(--line);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-md);
      overflow: hidden;
    }

    .card-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      padding: 14px 22px;
      border-bottom: 1px solid var(--line);
      background: var(--section-title-bg);
    }

    .card-head h2 {
      margin: 0;
      width: 100%;
      text-align: left;
      font-family: 'Montserrat', sans-serif;
      font-size: 1.08rem;
      color: var(--brand-primary);
      letter-spacing: -.01em;
    }

    .card-kicker {
      display: inline-flex;
      align-items: center;
      padding: 6px 10px;
      border-radius: 999px;
      background: rgba(255,255,255,.55);
      color: #7a5c00;
      font-size: .76rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .04em;
      white-space: nowrap;
    }

    .card-body {
      padding: 18px 22px;
    }

    .soft-note {
      padding: 14px 16px;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: #fbfcfd;
      color: var(--text-soft);
      line-height: 1.65;
      font-size: .92rem;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th, td {
      padding: 11px 10px;
      border-bottom: 1px solid #edf1f4;
      vertical-align: top;
      font-size: .91rem;
    }

    th {
      font-size: .76rem;
      text-transform: uppercase;
      letter-spacing: .05em;
      color: var(--text-soft);
      font-weight: 700;
      background: #f8fafc;
      text-align: center;
    }

    td {
      text-align: left;
    }

    tbody tr:last-child td {
      border-bottom: none;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 999px;
      padding: 6px 10px;
      font-size: .76rem;
      font-weight: 700;
      white-space: nowrap;
    }

    .pill.included {
      background: var(--success-soft);
      color: var(--success-text);
    }

    .pill.extra {
      background: var(--warning-soft);
      color: var(--warning-text);
    }

    .hotel-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 340px));
      gap: 14px;
      justify-content: start;
    }

    .hotel-card {
      border: 1px solid var(--line);
      background: linear-gradient(180deg, #ffffff 0%, #fbfcfd 100%);
      border-radius: 18px;
      padding: 16px;
      width: 100%;
    }

    .hotel-card h3 {
      margin: 0 0 10px;
      font-size: 1rem;
      color: var(--brand-primary);
      font-family: 'Montserrat', sans-serif;
      text-align: center;
    }

    .hotel-card p {
      margin: 6px 0;
      font-size: .9rem;
      line-height: 1.5;
      color: #475467;
      text-align: left;
    }

    .list-clean {
      margin: 0;
      padding-left: 18px;
    }

    .list-clean li {
      margin-bottom: 10px;
      line-height: 1.62;
      color: #475467;
    }

    .agent-box {
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 16px;
      background: linear-gradient(180deg, #fff 0%, #fbfcfd 100%);
      display: grid;
      grid-template-columns: 86px 1fr;
      gap: 14px;
      align-items: center;
    }

    .agent-photo {
      width: 86px;
      height: 86px;
      border-radius: 18px;
      overflow: hidden;
      border: 1px solid var(--line);
      background: #f3f4f6;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .agent-photo img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .agent-photo i {
      font-size: 28px;
      color: #94a3b8;
    }

    .agent-box .helper {
      margin-bottom: 10px;
      color: var(--text-soft);
      font-size: .91rem;
      line-height: 1.55;
    }

    .agent-box .label {
      display: block;
      margin-bottom: 6px;
      color: var(--text-soft);
      font-size: .78rem;
      text-transform: uppercase;
      font-weight: 700;
      letter-spacing: .05em;
    }

    .agent-box .name {
      font-weight: 800;
      font-size: 1.02rem;
      color: var(--brand-primary);
      margin-bottom: 4px;
    }

    .agent-box .phone {
      font-weight: 700;
      color: #344054;
    }

    .pay-stack {
      display: grid;
      gap: 14px;
    }

    .pay-card {
      border: 1px solid var(--line);
      background: linear-gradient(180deg, #ffffff 0%, #fbfbfd 100%);
      border-radius: 18px;
      padding: 18px;
    }

    .pay-card h3 {
      margin: 0 0 6px;
      font-size: 1rem;
      color: var(--brand-primary);
      font-family: 'Montserrat', sans-serif;
      text-align: center;
    }

    .pay-card p {
      margin: 0 0 12px;
      color: var(--text-soft);
      line-height: 1.6;
      font-size: .91rem;
      text-align: center;
    }

    .amounts {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 14px;
      justify-content: center;
    }

    .amount-pill {
      display: inline-flex;
      align-items: center;
      padding: 8px 12px;
      border-radius: 999px;
      background: var(--bg-soft);
      border: 1px solid var(--line);
      font-size: .88rem;
      font-weight: 700;
      color: var(--brand-primary);
    }

    .pay-link {
      display: flex;
      align-items: center;
      justify-content: center;
      width: fit-content;
      min-width: 180px;
      max-width: 230px;
      min-height: 44px;
      border-radius: 14px;
      background: var(--brand-primary);
      color: white;
      text-decoration: none;
      font-weight: 700;
      transition: .2s ease;
      margin: 0 auto;
      padding: 0 20px;
    }

    .pay-link:hover {
      opacity: .95;
      transform: translateY(-1px);
    }

    .billing-card {
      position: relative;
    }

    .pay-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 12px;
      padding: 7px 12px;
      border-radius: 999px;
      background: #eef2ff;
      border: 1px solid #c7d2fe;
      color: #3730a3;
      font-size: .78rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: .04em;
    }

    .pay-badge.offer {
      background: #fff7ed;
      border: 1px solid #fdba74;
      color: #c2410c;
    }

    .billing-box {
      border: 1px dashed #d6dae1;
      border-radius: 14px;
      background: #fafbfd;
      padding: 12px 14px;
      margin: 12px 0 14px;
    }

    .billing-line {
      display: block;
      padding: 6px 0;
      border-bottom: 1px dashed #e5e7eb;
      color: #334155;
      font-size: .9rem;
      line-height: 1.45;
    }

    .billing-line:last-child {
      border-bottom: none;
      font-weight: 800;
      color: #0f172a;
    }

    .empty-state {
      background: white;
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow-lg);
      text-align: center;
      padding: 90px 20px;
    }

    .empty-state h1 {
      margin: 0 0 10px;
      font-family: 'Montserrat', sans-serif;
      color: var(--brand-primary);
    }

    .empty-state p {
      color: var(--text-soft);
    }

    .back-home {
      display: inline-flex;
      margin-top: 18px;
      padding: 12px 18px;
      border-radius: 14px;
      background: var(--brand-primary);
      color: white;
      text-decoration: none;
      font-weight: 700;
    }

    .print-voucher {
      display: none;
    }

    .pv-classic {
      display: none;
    }

    @media (max-width: 1200px) {
      .summary-grid {
        grid-template-columns: repeat(2, 1fr);
      }

      .row-secondary,
      .row-bottom {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 900px) {
      .voucher-top {
        grid-template-columns: 1fr;
      }

      .voucher-head {
        flex-direction: column;
      }

      .voucher-brand {
        align-items: center;
      }

      .voucher-brand .subcopy,
      .voucher-brand .contact {
        text-align: center;
      }
    }

    @media (max-width: 640px) {
      .voucher-page {
        padding: 84px 0 34px;
      }

      .voucher-top,
      .summary-grid,
      .voucher-content {
        padding-left: 16px;
        padding-right: 16px;
      }

      .summary-grid {
        grid-template-columns: 1fr;
      }

      .card-head,
      .card-body {
        padding-left: 15px;
        padding-right: 15px;
      }

      .top-actions {
        flex-direction: column;
        align-items: stretch;
      }

      .top-actions-right {
        width: 100%;
        flex-direction: column;
      }

      .action-btn {
        width: 100%;
      }

      .voucher-brand img {
        width: 271px;
        margin-left: auto;
        margin-right: auto;
      }

      .voucher-brand .subcopy {
        width: 271px;
        text-align: center;
        display: -webkit-box;
        -webkit-line-clamp: 2;
        -webkit-box-orient: vertical;
        overflow: hidden;
      }

      .voucher-brand .contact {
        width: 271px;
        text-align: center;
        font-size: .82rem;
        line-height: 1.18;
      }

      .voucher-brand .contact div {
        white-space: nowrap;
      }

      .voucher-divider {
        display: block;
        max-width: 271px;
        margin-bottom: 10px;
      }

      .voucher-head .date {
        white-space: nowrap;
        font-size: 1.05rem;
        margin-top: 2px;
      }

      .voucher-head .title {
        white-space: nowrap;
      }

      .voucher-code-row {
        flex-direction: column;
        gap: 12px;
      }

      .voucher-code {
        min-width: 220px;
        padding: 12px 14px;
      }

      .voucher-qr img {
        width: 142px;
        height: 142px;
      }

      .agent-box {
        grid-template-columns: 72px 1fr;
      }

      .agent-photo {
        width: 72px;
        height: 72px;
      }

      th,
      .summary-card .label,
      .summary-card .value,
      .card-head h2,
      .card-kicker,
      .voucher-code span,
      .voucher-code strong,
      .pay-card h3,
      .amount-pill,
      .pay-link {
        white-space: nowrap;
      }

      th {
        font-size: .72rem;
        text-align: center;
      }

      .summary-card .label {
        font-size: .7rem;
      }

      .summary-card .value {
        font-size: .88rem;
      }

      td {
        text-align: left;
      }

      .hotel-card h3 {
        text-align: center;
      }

      .hotel-card p {
        text-align: left;
      }
    }


    .birthday-row td,
    .pv-birthday-row td {
      background: #fff7df !important;
      border-top: 1px solid #f2d28a;
      border-bottom: 1px solid #f2d28a;
    }

    .birthday-name {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-weight: 800;
      color: #7a4a00;
    }

    .birthday-icon {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 1.05em;
      line-height: 1;
    }

    .birthday-badge {
      display: none !important;
    }

    @media print {
      body { background: white; }
      #header-container, #footer-container, .wa-float, .top-actions { display: none !important; }
      .voucher-page { background: white !important; padding: 0 !important; min-height: auto !important; }
      .voucher-shell { max-width: none; padding: 0; }

      .voucher-web,
      #voucherWeb,
      #voucherEmpty {
        display: none !important;
      }

      #voucherPrint,
      .print-voucher,
      .pv-classic {
        display: block !important;
      }

      .pv-classic {
        background: #fff;
        color: #222;
        font-family: Arial, sans-serif;
        font-size: 12px;
        line-height: 1.35;
      }

      .pv-top {
        display: grid;
        grid-template-columns: 320px 1fr;
        gap: 20px;
        align-items: start;
        margin-bottom: 14px;
      }

      .pv-left img {
        width: 240px;
        max-width: 100%;
        display: block;
        margin-bottom: 8px;
      }

      .pv-subcopy {
        width: 240px;
        color: #666;
        font-size: 12px;
        line-height: 1.25;
        margin-bottom: 8px;
      }

      .pv-contact {
        width: 240px;
        color: #253b2f;
        font-size: 11.5px;
        line-height: 1.2;
      }

      .pv-right {
        text-align: center;
        padding-top: 10px;
      }

      .pv-date {
        color: #777;
        font-size: 16px;
        font-weight: 700;
        margin-bottom: 6px;
      }

      .pv-title {
        color: #253b2f;
        font-size: 28px;
        font-weight: 800;
        font-family: 'Montserrat', sans-serif;
        margin-bottom: 10px;
      }

      .pv-code-row {
        display: inline-flex;
        align-items: center;
        gap: 12px;
      }

      .pv-code-box {
        border: 1px solid #cfd4dc;
        border-radius: 10px;
        padding: 8px 14px;
        min-width: 220px;
        text-align: center;
        background: #fff;
      }

      .pv-code-box span {
        display: block;
        font-size: 10px;
        text-transform: uppercase;
        color: #6b7280;
        margin-bottom: 3px;
        font-weight: 700;
      }

      .pv-code-box strong {
        font-size: 18px;
        letter-spacing: .08em;
        font-family: 'Montserrat', sans-serif;
      }

      .pv-qr-box img {
        width: 92px;
        height: 92px;
        object-fit: contain;

    async function loadComponent(componentName, targetId) {
      try {
        const componentPath = `${BASE_PATH}components/${componentName}.html`;
        const response = await fetch(componentPath);
        if (!response.ok) throw new Error(`Error ${response.status}: ${response.statusText}`);
        const html = await response.text();
        const target = document.getElementById(targetId);
        if (target) {
          target.innerHTML = html;
          fixImagePaths(target);
        }
      } catch (error) {
        console.error(`Error cargando ${componentName}:`, error);
      }
    }

    function fixImagePaths(container) {
      const images = container.querySelectorAll('img[src*="assets/"]');
      images.forEach(img => {

    function formatDateLocalized(input, lang = "es") {
      if (!input) return i18n[lang].noData;

      const normalized = String(input).trim();
      const isoMatch = normalized.match(/^(\d{4})-(\d{2})-(\d{2})$/);
      const slashMatch = normalized.match(/^(\d{2})\/(\d{2})\/(\d{4})$/);

      let date;

      if (isoMatch) {
        date = new Date(`${isoMatch[1]}-${isoMatch[2]}-${isoMatch[3]}T12:00:00`);
      } else if (slashMatch) {
        date = new Date(`${slashMatch[3]}-${slashMatch[2]}-${slashMatch[1]}T12:00:00`);
      } else {
        const tentative = new Date(normalized);
        if (!Number.isNaN(tentative.getTime())) {
          date = tentative;
        } else {
          return normalized;
        }
      }

      const locale = lang === "en" ? "en-US" : "es-PE";
      const formatted = date.toLocaleDateString(locale, {
        weekday: "long",
        year: "numeric",
        month: "long",
        day: "numeric"
      });

      if (lang === "es") {
        return formatted.charAt(0).toUpperCase() + formatted.slice(1);
      }
      return formatted;
    }

    function getLocalizedField(field, lang) {
      if (field == null) return "";
      if (typeof field === "object" && !Array.isArray(field)) {
        return field[lang] || field.es || field.en || "";
      }
      return field;
    }


    function normalizeDateText(value) {
      return String(value || "")
        .toLowerCase()
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "")
        .trim();
    }

    function parseDateParts(value) {
      const raw = String(value || "").trim();
      if (!raw) return null;

      let match = raw.match(/^(\d{4})[-\/](\d{1,2})[-\/](\d{1,2})/);
      if (match) {
        return { year: Number(match[1]), month: Number(match[2]), day: Number(match[3]) };
      }

      match = raw.match(/^(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{2,4})$/);
      if (match) {
        const year = Number(match[3].length === 2 ? `20${match[3]}` : match[3]);
        return { day: Number(match[1]), month: Number(match[2]), year };
      }

      const normalized = normalizeDateText(raw)
        .replace(/\b(lunes|martes|miercoles|jueves|viernes|sabado|domingo|lun|mar|mie|jue|vie|sab|dom)\b/g, "")
        .replace(/[,.]/g, " ")
        .replace(/\s*-\s*/g, " ")
        .replace(/\s+de\s+/g, " ")
        .replace(/\s+/g, " ")
        .trim();

      const monthMap = {
        ene: 1, enero: 1, jan: 1, january: 1,
        feb: 2, febrero: 2, february: 2,
        mar: 3, marzo: 3, march: 3,
        abr: 4, abril: 4, apr: 4, april: 4,
        may: 5, mayo: 5,
        jun: 6, junio: 6, june: 6,
        jul: 7, julio: 7, july: 7,
        ago: 8, agosto: 8, aug: 8, august: 8,
        sep: 9, set: 9, sept: 9, septiembre: 9, setiembre: 9, september: 9,
        oct: 10, octubre: 10, october: 10,
        nov: 11, noviembre: 11, november: 11,
        dic: 12, diciembre: 12, dec: 12, december: 12
      };

      match = normalized.match(/(\d{1,2})\s+([a-z]+)\s+(\d{4})/);
      if (match && monthMap[match[2]]) {
        return { day: Number(match[1]), month: monthMap[match[2]], year: Number(match[3]) };
      }

      match = normalized.match(/([a-z]+)\s+(\d{1,2})\s+(\d{4})/);
      if (match && monthMap[match[1]]) {
        return { day: Number(match[2]), month: monthMap[match[1]], year: Number(match[3]) };
      }

      return null;
    }

    function getServiceDateParts(servicios) {
      return (Array.isArray(servicios) ? servicios : [])
        .map((servicio) => parseDateParts(servicio.fecha))
        .filter(Boolean);
    }

    function getTravelerBirthdayInfo(turista, servicios) {
      if (turista && turista.destacado) {
        return {
          active: true,
          icon: turista.destacadoIcono || "🎂",
          text: turista.destacadoTexto || "Cumpleaños"
        };
      }

      const birth = parseDateParts(turista?.fechaNacimiento || turista?.fechaNacimientoTexto || "");
      if (!birth) return { active: false, icon: "🎂", text: "" };

      const matchingServiceDate = getServiceDateParts(servicios)
        .find((date) => date.day === birth.day && date.month === birth.month);

      if (!matchingServiceDate) return { active: false, icon: "🎂", text: "" };

      const day = String(birth.day).padStart(2, "0");
      const month = String(birth.month).padStart(2, "0");
      return {
        active: true,
        icon: "🎂",
        text: currentLanguage === "en"
          ? `Birthday during service - ${month}/${day}`
          : `Cumpleaños durante el servicio - ${day}/${month}`
      };
    }

    function buildPassengerSummary(reserva, turistas, lang = "es") {
      const total = Number(reserva?.cantidadPaxs || turistas?.length || 0);
      const serviceParts = parseDateParts(reserva?.fechaViaje || reserva?.fechaVoucher || reserva?.fechaEmision || "");
      let adults = 0;
      let children = 0;

      (Array.isArray(turistas) ? turistas : []).forEach((turista) => {
        const rawType = normalizeDateText(turista?.tipoPasajero || turista?.tipo || turista?.categoria || turista?.tarifa || "");
        if (/nino|niño|child|menor/.test(rawType)) {
          children += 1;
          return;
        }
        if (/adult/.test(rawType)) {
          adults += 1;
          return;
        }

        const birth = parseDateParts(turista?.fechaNacimiento || turista?.fechaNacimientoTexto || "");
        if (birth && serviceParts) {
          let age = serviceParts.year - birth.year;
          if (serviceParts.month < birth.month || (serviceParts.month === birth.month && serviceParts.day < birth.day)) {
            age -= 1;
          }
          if (age >= 0 && age < 12) children += 1;
          else adults += 1;
        } else {
          adults += 1;
        }
      });

      if (!adults && !children && total) adults = total;
      if (total && adults + children < total) adults += total - adults - children;

      if (lang === "en") {
        const parts = [];
        if (adults) parts.push(`${adults} adult${adults === 1 ? "" : "s"}`);
        if (children) parts.push(`${children} child${children === 1 ? "" : "ren"}`);
        return parts.join(" and ") || i18n[lang].noData;
      }

      const parts = [];
      if (adults) parts.push(`${adults} adulto${adults === 1 ? "" : "s"}`);
      if (children) parts.push(`${children} niño${children === 1 ? "" : "s"}`);
      return parts.join(" y ") || i18n[lang].noData;
    }

    function formatServiceDatePrint(value) {
      const parts = parseDateParts(value);
      if (!parts) return value || "";
      const months = ["Ene", "Feb", "Mar", "Abr", "May", "Jun", "Jul", "Ago", "Sep", "Oct", "Nov", "Dic"];
      return `${String(parts.day).padStart(2, "0")}-${months[parts.month - 1] || String(parts.month).padStart(2, "0")}-${parts.year}`;
    }

    function getServiceNamePrint(nombre) {

    function getPrimaryNameAndSurname(fullName) {
      const parts = String(fullName || "")

        .replace(/\s+/g, " ")

      if (!parts.length) return { firstName: "Cliente", firstSurname: "" };
      const firstName = parts[0];

      return { firstName, firstSurname };

    function codigoCoincideExacto(valorA, valorB) {
      return String(valorA || "").trim().toUpperCase() === String(valorB || "").trim().toUpperCase();
    }

    async function obtenerReservaActual() {
      const params = new URLSearchParams(window.location.search);
      const codigoUrl = params.get("codigo");
      const reservaRaw = localStorage.getItem("reservaSeleccionada");

      if (reservaRaw) {
        try {
          const reservaLocal = JSON.parse(reservaRaw);
          if (!codigoUrl || codigoCoincideExacto(reservaLocal?.codigo, codigoUrl)) {
            return reservaLocal;
          }
        } catch (error) {
          console.warn("No se pudo leer la reserva guardada en el navegador:", error);
          localStorage.removeItem("reservaSeleccionada");
        }
      }

      if (!codigoUrl) return null;

      if (window.MyCuscoTripApiClient?.lookupReservation) {
        try {
          const result = await window.MyCuscoTripApiClient.lookupReservation({ code: codigoUrl });
          if (result?.found && result.voucher) {
            localStorage.setItem("reservaSeleccionada", JSON.stringify(result.voucher));
            return result.voucher;
          }
        } catch (error) {
          console.warn("No se pudo consultar voucher en backend. Se usará respaldo estático.", error);
        }
      }

      const response = await fetch("./data/reservas.json", { cache: "no-store" });
      if (!response.ok) throw new Error("No se pudo cargar data/reservas.json");
      const reservas = await response.json();
      const reservaEncontrada = reservas.find((reserva) => codigoCoincideExacto(reserva.codigo, codigoUrl));

      if (reservaEncontrada) {
        localStorage.setItem("reservaSeleccionada", JSON.stringify(reservaEncontrada));
      }

      return reservaEncontrada || null;
    }

    async function initVoucher() {
      const webEl = document.getElementById("voucherWeb");
      const printEl = document.getElementById("voucherPrint");
      const emptyEl = document.getElementById("voucherEmpty");

      applyStaticTranslations();

      try {
        const reserva = await obtenerReservaActual();

        if (!reserva) {
          emptyEl.style.display = "block";
          webEl.style.display = "none";
          return;
        }

        applyVoucherDocumentTitle(reserva);
        webEl.innerHTML = renderWebVoucher(reserva);

        if (printEl) {
          printEl.innerHTML = renderPrintVoucher(reserva);
        }

        webEl.style.display = "block";
        emptyEl.style.display = "none";
      } catch (error) {
        console.error("Error leyendo reserva:", error);
        emptyEl.style.display = "block";
        webEl.style.display = "none";
      }
    }

    function setupLanguageSwitcher() {
      const select = document.getElementById("languageSelect");
      if (!select) return;

      select.value = currentLanguage;

      select.addEventListener("change", (e) => {
        currentLanguage = e.target.value;
        localStorage.setItem("voucherLanguage", currentLanguage);
        initVoucher();
      });
    }

    window.addEventListener("beforeprint", () => {
      try {
        const reserva = JSON.parse(localStorage.getItem("reservaSeleccionada") || "null");
        if (reserva) applyVoucherDocumentTitle(reserva);
      } catch (error) {}
    });

    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', async () => {
        await initializeSharedComponents();
        setupLanguageSwitcher();
        initVoucher();
      });
    } else {
      initializeSharedComponents().then(() => {
        setupLanguageSwitcher();
        initVoucher();
      });
    }
